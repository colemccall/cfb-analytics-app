<!DOCTYPE html>
<html lang="en" data-theme="dynasty-dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Players — CFB Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Inter:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav>
  <span class="nav-brand">CFB Analytics</span>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="players.html" class="active">Players</a>
    <a href="ratings.html">Ratings</a>
    <a href="teams.html">Teams</a>
    <a href="research.html">Research</a>
  </div>
  <span class="nav-spacer"></span>
  <div class="theme-swatches">
    <button class="theme-swatch" data-theme="dynasty-dark" title="Dark"></button>
    <button class="theme-swatch" data-theme="mid" title="Slate"></button>
    <button class="theme-swatch" data-theme="light" title="Light"></button>
  </div>
</nav>

<div class="page-header">
  <h1>Player Search</h1>
  <p>Search and filter all rated players. Click any card for a full SHAP breakdown.</p>
</div>

<div class="page-content">
  <!-- Top filter bar: search + selects + rating slider -->
  <div class="filter-bar">
    <div class="filter-group">
      <input type="text" id="search-input" placeholder="Search player or team…">
    </div>
    <div class="filter-group">
      <select id="filter-conference">
        <option value="">All Conferences</option>
      </select>
    </div>
    <div class="filter-group">
      <select id="filter-season">
        <option value="2025">2025</option>
        <option value="2024">2024</option>
        <option value="2023">2023</option>
        <option value="2022">2022</option>
        <option value="2021">2021</option>
      </select>
    </div>
    <div class="filter-group filter-group-range">
      <span class="filter-label">Min OVR: <strong id="min-rating-label">0</strong></span>
      <input type="range" id="filter-min-rating" min="0" max="99" value="0" step="1">
    </div>
    <span class="result-count" id="result-count"></span>
  </div>

  <!-- Position chip filters (two rows: offense / defense+special) -->
  <div class="pos-filter-rows">
    <div class="pos-filter-row" id="pos-chips-offense"></div>
    <div class="pos-filter-row" id="pos-chips-defense"></div>
  </div>

  <div class="player-grid" id="player-grid">
    <p class="empty-state">Loading players…</p>
  </div>
</div>

<!-- Player detail modal -->
<div class="modal-overlay" id="player-modal">
  <div class="modal-inner"></div>
</div>

<script src="js/config.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/playerSearch.js"></script>
<script>
  const _savedTheme = localStorage.getItem("cfb-theme");
  if (_savedTheme) document.documentElement.setAttribute("data-theme", _savedTheme);
  document.querySelectorAll(".theme-swatch").forEach(btn => {
    btn.addEventListener("click", () => {
      const t = btn.dataset.theme;
      document.documentElement.setAttribute("data-theme", t);
      localStorage.setItem("cfb-theme", t);
    });
  });
  initPlayerSearch();
</script>
</body>
</html>
